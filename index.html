<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arteris Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary-dark:#0A1628;
  --primary-blue:#003087;
  --accent:#E8610A;
  --bg:#F5F7FA;
  --white:#FFFFFF;
  --text:#1A1A2E;
  --muted:#6B7280;
  --border:#E2E8F0;
  --shadow:0 8px 32px rgba(10,22,40,0.18);
  --radius:16px;
  --font:'Inter',sans-serif;
}
[data-theme="dark"]{
  --bg:#1a1f2e;
  --white:#242b3d;
  --text:#e8eaf0;
  --muted:#9ca3af;
  --border:#2d3748;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}
body{font-family:var(--font);background:transparent;color:var(--text)}
</style>
</head>
<body>

<!-- Floating Button -->
<button id="chat-toggle" aria-label="Open Arteris Assistant chat" aria-expanded="false">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>

<!-- Chat Panel -->
<div id="chat-panel" role="dialog" aria-modal="true" aria-label="Arteris Assistant" aria-hidden="true">
  <!-- Header -->
  <div id="chat-header">
    <div id="header-left">
      <div id="header-avatar" aria-hidden="true">A</div>
      <div>
        <div id="header-title">Arteris Assistant</div>
        <div id="header-subtitle">Support</div>
      </div>
    </div>
    <div id="header-actions">
      <button id="dark-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button id="debug-toggle" aria-label="Toggle debug panel" title="Debug">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
          <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </button>
      <button id="metrics-toggle" aria-label="Toggle metrics panel" title="Metrics">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </button>
      <button id="chat-close" aria-label="Close chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Debug Panel -->
  <div id="debug-panel" aria-live="polite" hidden>
    <div id="debug-title">Debug Info</div>
    <div id="debug-content"></div>
  </div>

  <!-- Metrics Panel -->
  <div id="metrics-panel" aria-live="polite" hidden>
    <div id="metrics-title">Session Metrics</div>
    <div id="metrics-content"></div>
  </div>

  <!-- Messages -->
  <div id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages"></div>

  <!-- Suggested Questions -->
  <div id="suggestions-area" aria-label="Suggested questions">
    <div id="suggestions-label">Suggested questions</div>
    <div id="suggestions-chips" role="list"></div>
  </div>

  <!-- Input -->
  <div id="chat-input-area">
    <div id="input-wrapper">
      <textarea id="chat-input" placeholder="Ask about Arteris products, solutions..." aria-label="Type your message" rows="1" maxlength="4000"></textarea>
      <button id="send-btn" aria-label="Send message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div id="char-count" aria-live="polite">0 / 4000</div>
  </div>
</div>

<style>
/* ===== FLOATING BUTTON ===== */
#chat-toggle{
  position:fixed;bottom:28px;right:28px;
  width:60px;height:60px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(232,97,10,0.45);
  transition:transform .2s,box-shadow .2s;z-index:9998;
}
#chat-toggle:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(232,97,10,0.55)}
#chat-toggle:focus-visible{outline:3px solid var(--accent);outline-offset:3px}

/* ===== CHAT PANEL ===== */
#chat-panel{
  position:fixed;bottom:100px;right:28px;
  width:380px;height:560px;
  background:var(--bg);border-radius:var(--radius);
  box-shadow:var(--shadow);
  display:flex;flex-direction:column;
  overflow:hidden;z-index:9999;
  transform:translateY(20px) scale(0.97);opacity:0;
  pointer-events:none;
  transition:transform .25s cubic-bezier(.4,0,.2,1),opacity .25s;
}
#chat-panel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:all}

@media(max-width:480px){
  #chat-panel{width:100vw;height:100dvh;bottom:0;right:0;border-radius:0}
  #chat-toggle{bottom:16px;right:16px}
}

/* ===== HEADER ===== */
#chat-header{
  background:var(--primary-dark);
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
#header-left{display:flex;align-items:center;gap:10px}
#header-avatar{
  width:36px;height:36px;border-radius:50%;
  background:var(--accent);color:#fff;
  font-weight:700;font-size:16px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
#header-title{color:#fff;font-weight:600;font-size:15px;line-height:1.2}
#header-subtitle{color:rgba(255,255,255,.6);font-size:12px}
#header-actions{display:flex;align-items:center;gap:4px}
#header-actions button{
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,.7);padding:6px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
#header-actions button:hover{background:rgba(255,255,255,.12);color:#fff}
#header-actions button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ===== DEBUG / METRICS PANELS ===== */
#debug-panel,#metrics-panel{
  background:var(--primary-dark);color:#a8d8a8;
  font-family:monospace;font-size:11px;
  padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.08);
  max-height:140px;overflow-y:auto;flex-shrink:0;
}
#debug-title,#metrics-title{color:#7dd3fc;font-weight:600;margin-bottom:6px;font-size:12px}
#debug-content div,#metrics-content div{margin-bottom:3px}

/* ===== MESSAGES ===== */
#chat-messages{
  flex:1;overflow-y:auto;padding:16px 14px;
  display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth;
}
#chat-messages::-webkit-scrollbar{width:4px}
#chat-messages::-webkit-scrollbar-track{background:transparent}
#chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.msg-row{display:flex;gap:8px;align-items:flex-end}
.msg-row.user{flex-direction:row-reverse}

.msg-avatar{
  width:30px;height:30px;border-radius:50%;
  background:var(--primary-blue);color:#fff;
  font-weight:700;font-size:13px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

.msg-bubble-wrap{display:flex;flex-direction:column;max-width:78%}
.msg-row.user .msg-bubble-wrap{align-items:flex-end}

.msg-bubble{
  padding:10px 14px;border-radius:14px;
  font-size:14px;line-height:1.55;word-break:break-word;
  white-space:pre-wrap;
}
.msg-row.assistant .msg-bubble{
  background:var(--white);color:var(--text);
  border-bottom-left-radius:4px;
  box-shadow:0 1px 4px rgba(0,0,0,.07);
}
.msg-row.user .msg-bubble{
  background:var(--primary-blue);color:#fff;
  border-bottom-right-radius:4px;
}

.msg-meta{
  display:flex;align-items:center;gap:6px;
  margin-top:4px;flex-wrap:wrap;
}
.msg-time{font-size:11px;color:var(--muted)}
.msg-mode{
  font-size:10px;padding:2px 7px;border-radius:20px;
  background:rgba(0,48,135,.1);color:var(--primary-blue);font-weight:500;
}
[data-theme="dark"] .msg-mode{background:rgba(0,48,135,.3);color:#7dd3fc}

.msg-sources{font-size:11px;color:var(--muted);margin-top:3px}

.msg-actions{display:flex;gap:4px;margin-top:5px}
.msg-action-btn{
  background:none;border:1px solid var(--border);
  border-radius:8px;padding:3px 8px;
  font-size:11px;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;gap:3px;
  transition:background .15s,color .15s,border-color .15s;
}
.msg-action-btn:hover{background:var(--border);color:var(--text)}
.msg-action-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.msg-action-btn.active-like{border-color:#22c55e;color:#22c55e;background:rgba(34,197,94,.08)}
.msg-action-btn.active-dislike{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.08)}

/* ===== TYPING INDICATOR ===== */
#typing-indicator{display:none;align-items:flex-end;gap:8px;padding:0 14px 8px}
#typing-indicator.visible{display:flex}
.typing-bubble{
  background:var(--white);border-radius:14px;border-bottom-left-radius:4px;
  padding:10px 14px;display:flex;gap:5px;align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,.07);
}
.typing-dot{
  width:7px;height:7px;border-radius:50%;background:var(--muted);
  animation:bounce .9s infinite;
}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ===== SUGGESTIONS ===== */
#suggestions-area{
  padding:8px 14px 6px;border-top:1px solid var(--border);flex-shrink:0;
  max-height:130px;overflow-y:auto;
}
#suggestions-area::-webkit-scrollbar{width:3px}
#suggestions-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#suggestions-label{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:500}
#suggestions-chips{display:flex;flex-wrap:wrap;gap:6px}
.suggestion-chip{
  background:var(--white);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;
  font-size:12px;cursor:pointer;color:var(--primary-blue);
  font-weight:500;transition:background .15s,border-color .15s,color .15s;
  white-space:nowrap;
}
.suggestion-chip:hover{background:var(--primary-blue);color:#fff;border-color:var(--primary-blue)}
.suggestion-chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ===== INPUT AREA ===== */
#chat-input-area{
  padding:10px 14px 12px;border-top:1px solid var(--border);
  background:var(--white);flex-shrink:0;
}
#input-wrapper{display:flex;gap:8px;align-items:flex-end}
#chat-input{
  flex:1;border:1.5px solid var(--border);border-radius:12px;
  padding:10px 14px;font-family:var(--font);font-size:14px;
  color:var(--text);background:var(--bg);
  resize:none;outline:none;line-height:1.5;
  max-height:100px;overflow-y:auto;
  transition:border-color .15s;
}
#chat-input:focus{border-color:var(--primary-blue)}
#chat-input::placeholder{color:var(--muted)}
#send-btn{
  width:40px;height:40px;border-radius:12px;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .15s,transform .1s;
}
#send-btn:hover{background:#c9520a;transform:scale(1.05)}
#send-btn:focus-visible{outline:3px solid var(--accent);outline-offset:3px}
#send-btn:disabled{background:var(--muted);cursor:not-allowed;transform:none}
#char-count{font-size:11px;color:var(--muted);text-align:right;margin-top:4px}

/* ===== TOAST ===== */
#toast{
  position:fixed;bottom:100px;right:28px;
  background:var(--primary-dark);color:#fff;
  padding:10px 18px;border-radius:10px;font-size:13px;
  opacity:0;pointer-events:none;z-index:10000;
  transition:opacity .25s;
}
#toast.show{opacity:1}
@media(max-width:480px){#toast{right:16px;bottom:80px}}
</style>

<div id="toast" role="status" aria-live="polite"></div>

<script>
// ===== CONFIG =====
const API_BASE = 'https://YOUR_API_GATEWAY_URL'; // Replace with your AWS API Gateway URL
const ENDPOINTS = {
  chat: API_BASE + '/chat',
  feedback: API_BASE + '/feedback',
  escalate: API_BASE + '/escalate',
  metrics: API_BASE + '/metrics'
};

// ===== PREDEFINED QUESTIONS =====
const PREDEFINED_QUESTIONS = [
  { question: "What is Arteris?", retrieval_hint: { ui_question_key: "what_is_arteris", deterministic_retrieval: true } },
  { question: "Why does Arteris matter for modern SoC design?", retrieval_hint: { ui_question_key: "why_arteris_matters", deterministic_retrieval: true } },
  { question: "What products does Arteris offer?", retrieval_hint: { ui_question_key: "what_products_does_arteris_offer", deterministic_retrieval: true } },
  { question: "What is FlexNoC?", retrieval_hint: { ui_question_key: "what_is_flexnoc", deterministic_retrieval: true } },
  { question: "What is Ncore?", retrieval_hint: { ui_question_key: "what_is_ncore", deterministic_retrieval: true } },
  { question: "What is Magillem?", retrieval_hint: { ui_question_key: "what_is_magillem", deterministic_retrieval: true } },
  { question: "What is Arteris' multi-die solution?", retrieval_hint: { ui_question_key: "what_is_multi_die", deterministic_retrieval: true } },
  { question: "Who are Arteris customers?", retrieval_hint: { ui_question_key: "who_are_arteris_customers", deterministic_retrieval: true } },
  { question: "Who is on the Arteris leadership team?", retrieval_hint: { ui_question_key: "who_is_arteris_team", deterministic_retrieval: true } },
  { question: "What is a network-on-chip (NoC)?", retrieval_hint: { ui_question_key: "what_is_noc", deterministic_retrieval: true } },
  { question: "What learning resources does Arteris provide?", retrieval_hint: { ui_question_key: "what_resources_does_arteris_offer", deterministic_retrieval: true } },
  { question: "What is it like to work at Arteris?", retrieval_hint: { ui_question_key: "what_is_it_like_to_work_at_arteris", deterministic_retrieval: true } }
];

// ===== STATE =====
const state = {
  open: false,
  debugVisible: false,
  metricsVisible: false,
  darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches,
  sessionId: 'sess_' + Math.random().toString(36).slice(2) + Date.now(),
  userId: '',
  messages: [],
  lastDebug: null,
  metrics: { total: 0, likes: 0, dislikes: 0, escalations: 0, kb: 0, general: 0 }
};

// ===== DOM REFS =====
const $ = id => document.getElementById(id);
const panel = $('chat-panel');
const toggleBtn = $('chat-toggle');
const closeBtn = $('chat-close');
const messagesEl = $('chat-messages');
const inputEl = $('chat-input');
const sendBtn = $('send-btn');
const charCount = $('char-count');
const debugPanel = $('debug-panel');
const debugContent = $('debug-content');
const metricsPanel = $('metrics-panel');
const metricsContent = $('metrics-content');
const chipsEl = $('suggestions-chips');
const toastEl = $('toast');

// ===== DARK MODE =====
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
}
applyTheme();
$('dark-toggle').addEventListener('click', () => {
  state.darkMode = !state.darkMode;
  applyTheme();
});

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// ===== PANEL OPEN/CLOSE =====
function openChat() {
  state.open = true;
  panel.classList.add('open');
  panel.setAttribute('aria-hidden', 'false');
  toggleBtn.setAttribute('aria-expanded', 'true');
  inputEl.focus();
  if (state.messages.length === 0) addWelcome();
}
function closeChat() {
  state.open = false;
  panel.classList.remove('open');
  panel.setAttribute('aria-hidden', 'true');
  toggleBtn.setAttribute('aria-expanded', 'false');
  toggleBtn.focus();
}
toggleBtn.addEventListener('click', () => state.open ? closeChat() : openChat());
closeBtn.addEventListener('click', closeChat);
document.addEventListener('keydown', e => { if (e.key === 'Escape' && state.open) closeChat(); });

// ===== DEBUG / METRICS TOGGLE =====
$('debug-toggle').addEventListener('click', () => {
  state.debugVisible = !state.debugVisible;
  debugPanel.hidden = !state.debugVisible;
  if (state.debugVisible) renderDebug(state.lastDebug);
});
$('metrics-toggle').addEventListener('click', () => {
  state.metricsVisible = !state.metricsVisible;
  metricsPanel.hidden = !state.metricsVisible;
  if (state.metricsVisible) fetchMetrics();
});

// ===== SAFE TEXT HELPERS =====
function safeText(el, text) { el.textContent = text; }
function createEl(tag, cls) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  return el;
}

// ===== WELCOME MESSAGE =====
function addWelcome() {
  addMessage({ role: 'assistant', text: "Hi, I'm the Arteris assistant. How can I help you today?", timestamp: new Date() });
}

// ===== RENDER SUGGESTIONS =====
function renderSuggestions() {
  chipsEl.innerHTML = '';
  PREDEFINED_QUESTIONS.forEach(q => {
    const chip = createEl('button', 'suggestion-chip');
    chip.setAttribute('role', 'listitem');
    chip.setAttribute('aria-label', 'Ask: ' + q.question);
    safeText(chip, q.question);
    chip.addEventListener('click', () => sendPredefined(q));
    chipsEl.appendChild(chip);
  });
}
renderSuggestions();

// ===== ADD MESSAGE TO DOM =====
function addMessage(msg) {
  state.messages.push(msg);
  const row = createEl('div', 'msg-row ' + msg.role);
  row.setAttribute('data-id', msg.id || '');

  if (msg.role === 'assistant') {
    const avatar = createEl('div', 'msg-avatar');
    safeText(avatar, 'A');
    row.appendChild(avatar);
  }

  const wrap = createEl('div', 'msg-bubble-wrap');
  const bubble = createEl('div', 'msg-bubble');
  safeText(bubble, msg.text);
  wrap.appendChild(bubble);

  // Meta row
  const meta = createEl('div', 'msg-meta');
  const time = createEl('span', 'msg-time');
  safeText(time, formatTime(msg.timestamp));
  meta.appendChild(time);

  if (msg.mode) {
    const modeEl = createEl('span', 'msg-mode');
    safeText(modeEl, msg.mode.replace(/_/g, ' '));
    meta.appendChild(modeEl);
  }
  wrap.appendChild(meta);

  if (msg.sources && msg.sources.length > 0) {
    const src = createEl('div', 'msg-sources');
    safeText(src, 'Sources: ' + msg.sources.join(', '));
    wrap.appendChild(src);
  }

  if (msg.role === 'assistant' && msg.id) {
    wrap.appendChild(buildActions(msg));
  }

  row.appendChild(wrap);
  messagesEl.appendChild(row);
  scrollToBottom();
}

// ===== ACTION BUTTONS =====
function buildActions(msg) {
  const actions = createEl('div', 'msg-actions');

  // Copy
  const copyBtn = createEl('button', 'msg-action-btn');
  copyBtn.setAttribute('aria-label', 'Copy message');
  safeText(copyBtn, '📋 Copy');
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(msg.text).then(() => showToast('Copied to clipboard'));
  });
  actions.appendChild(copyBtn);

  // Like
  const likeBtn = createEl('button', 'msg-action-btn');
  likeBtn.setAttribute('aria-label', 'Like this response');
  safeText(likeBtn, '👍 Like');
  likeBtn.addEventListener('click', () => {
    if (likeBtn.classList.contains('active-like')) return;
    likeBtn.classList.add('active-like');
    dislikeBtn.classList.remove('active-dislike');
    sendFeedback(msg, 'like');
    state.metrics.likes++;
  });
  actions.appendChild(likeBtn);

  // Dislike
  const dislikeBtn = createEl('button', 'msg-action-btn');
  dislikeBtn.setAttribute('aria-label', 'Dislike this response');
  safeText(dislikeBtn, '👎 Dislike');
  dislikeBtn.addEventListener('click', () => {
    if (dislikeBtn.classList.contains('active-dislike')) return;
    dislikeBtn.classList.add('active-dislike');
    likeBtn.classList.remove('active-like');
    sendFeedback(msg, 'dislike');
    state.metrics.dislikes++;
  });
  actions.appendChild(dislikeBtn);

  // Escalate
  const escBtn = createEl('button', 'msg-action-btn');
  escBtn.setAttribute('aria-label', 'Escalate to human expert');
  safeText(escBtn, '🔗 Escalate');
  escBtn.addEventListener('click', () => sendEscalate(msg));
  actions.appendChild(escBtn);

  return actions;
}

// ===== TYPING INDICATOR =====
function showTyping() {
  let ti = $('typing-indicator');
  if (!ti) {
    ti = createEl('div', '');
    ti.id = 'typing-indicator';
    ti.setAttribute('aria-label', 'Arteris Assistant is typing');
    const av = createEl('div', 'msg-avatar');
    safeText(av, 'A');
    const tb = createEl('div', 'typing-bubble');
    [1,2,3].forEach(() => tb.appendChild(createEl('div', 'typing-dot')));
    ti.appendChild(av);
    ti.appendChild(tb);
    messagesEl.appendChild(ti);
  }
  ti.classList.add('visible');
  scrollToBottom();
}
function hideTyping() {
  const ti = $('typing-indicator');
  if (ti) ti.classList.remove('visible');
}

// ===== SCROLL =====
function scrollToBottom() {
  requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

// ===== FORMAT TIME =====
function formatTime(d) {
  const dt = d instanceof Date ? d : new Date(d);
  return dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ===== SEND MESSAGE =====
async function sendMessage(text, retrieval_hint) {
  if (!text.trim()) return;
  const userMsg = { role: 'user', text: text.trim(), timestamp: new Date() };
  addMessage(userMsg);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  charCount.textContent = '0 / 4000';
  sendBtn.disabled = true;
  showTyping();
  state.metrics.total++;

  const body = {
    session_id: state.sessionId,
    user_id: state.userId,
    message: text.trim(),
    debug: state.debugVisible
  };
  if (retrieval_hint) body.retrieval_hint = retrieval_hint;

  let attempts = 0;
  while (attempts < 2) {
    try {
      const res = await fetch(ENDPOINTS.chat, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      hideTyping();
      sendBtn.disabled = false;

      const msgId = data.response_id || 'msg_' + Date.now();
      const assistantMsg = {
        id: msgId,
        role: 'assistant',
        text: data.response || 'No response received.',
        timestamp: new Date(),
        mode: data.mode,
        sources: data.sources || [],
        original_user_message: text.trim()
      };
      addMessage(assistantMsg);

      if (data.used_knowledge === 'kb') state.metrics.kb++;
      else state.metrics.general++;

      if (state.debugVisible) {
        state.lastDebug = {
          mode: data.mode,
          used_knowledge: data.used_knowledge,
          sources: data.sources,
          retrieval_hint: retrieval_hint || null
        };
        renderDebug(state.lastDebug);
      }
      return;
    } catch (err) {
      attempts++;
      if (attempts >= 2) {
        hideTyping();
        sendBtn.disabled = false;
        addMessage({
          id: 'err_' + Date.now(),
          role: 'assistant',
          text: 'Sorry, I encountered an error. Please try again.',
          timestamp: new Date()
        });
      }
    }
  }
}

function sendPredefined(q) {
  sendMessage(q.question, q.retrieval_hint);
}

// ===== FEEDBACK =====
async function sendFeedback(msg, type) {
  try {
    await fetch(ENDPOINTS.feedback, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: state.sessionId, response_id: msg.id, feedback: type })
    });
    showToast(type === 'like' ? 'Thanks for the feedback!' : 'Feedback noted.');
  } catch { showToast('Could not send feedback.'); }
}

// ===== ESCALATE =====
async function sendEscalate(msg) {
  try {
    await fetch(ENDPOINTS.escalate, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: state.sessionId,
        user_message: msg.original_user_message || '',
        assistant_response: msg.text
      })
    });
    state.metrics.escalations++;
    showToast('An expert will join the conversation shortly.');
  } catch { showToast('Could not escalate. Please try again.'); }
}

// ===== METRICS =====
async function fetchMetrics() {
  renderMetricsLocal();
  try {
    const res = await fetch(ENDPOINTS.metrics);
    if (!res.ok) return;
    const data = await res.json();
    renderMetricsRemote(data);
  } catch { /* metrics optional */ }
}
function renderMetricsLocal() {
  metricsContent.innerHTML = '';
  const m = state.metrics;
  [
    ['Session requests', m.total],
    ['Likes', m.likes],
    ['Dislikes', m.dislikes],
    ['Escalations', m.escalations],
    ['KB answers', m.kb],
    ['General LLM answers', m.general]
  ].forEach(([k, v]) => {
    const d = createEl('div');
    safeText(d, k + ': ' + v);
    metricsContent.appendChild(d);
  });
}
function renderMetricsRemote(data) {
  const sep = createEl('div');
  safeText(sep, '— Backend —');
  metricsContent.appendChild(sep);
  Object.entries(data).forEach(([k, v]) => {
    const d = createEl('div');
    safeText(d, k + ': ' + v);
    metricsContent.appendChild(d);
  });
}

// ===== DEBUG RENDER =====
function renderDebug(info) {
  debugContent.innerHTML = '';
  if (!info) return;
  Object.entries(info).forEach(([k, v]) => {
    const d = createEl('div');
    safeText(d, k + ': ' + JSON.stringify(v));
    debugContent.appendChild(d);
  });
}

// ===== INPUT HANDLING =====
inputEl.addEventListener('input', () => {
  charCount.textContent = inputEl.value.length + ' / 4000';
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(inputEl.value);
  }
});
sendBtn.addEventListener('click', () => sendMessage(inputEl.value));
</script>
